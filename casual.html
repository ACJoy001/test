// Upper Intermediate (UI) is a flexible level: for any pairing check, it can present as
// either "Intermediate" or "Advance" — whichever makes the team legal. The only pairing that
// stays banned outright is a literal Advance partnered with a literal Beginner (no UI involved).
// A team's "identities" are every literal 2-level composition it could legally present as; two
// teams can face each other if their identity sets share at least one composition in common.

  return level === "Upper Intermediate" ? ["Intermediate", "Advance"] : [level];

function pairIsBanned(a, b) {

    for (const r2 of resolutions(l2)) {
      if (!pairIsBanned(r1, r2)) out.add([r1, r2].sort().join("-"));

  const idA = teamIdentities(levelsA);

  for (const id of idA) if (idB.has(id)) return true;

// another literal UI+Beginner team or a literal Intermediate+Beginner team (both resolve to the
// same "Intermediate+Beginner" identity). When a group of 4 allows more than one valid pairing,
// slightly prefer the UI+Beginner vs UI+Beginner pairing. This never changes WHICH 4 players get
// selected — only how an already-chosen group of 4 gets split into teams.

  if (all.every((g) => g === all[0])) return all[0] === "Male" ? "Men's Doubles" : "Women's Doubles";

  const teamB = b.map((i) => four[i]);

  const levelsB = teamB.map((p) => p.level);

    for (let j = i + 1; j < n; j++)
      for (let k = j + 1; k < n; k++)

// happens to be easiest to find (e.g. Mixed) — it varies naturally based on who's available.

    const categoryOrder = categoryFilter ? [categoryFilter] : shuffle(ALL_CATEGORIES);

    let forced = false;
    for (const cat of categoryOrder) {
      found = searchQuad(remaining, cat, playedGroupsSet, true);
      if (found) break;

    if (!found) {
      for (const cat of categoryOrder) {
        found = searchQuad(remaining, cat, playedGroupsSet, false);
        if (found) { forced = true; break; }

    if (!found) break;
    matches.push({ ...found, repeatForced: forced && playedGroupsSet.has(groupKey(found.players.map((x) => x.id))) });

    .filter((id) => playersById[id])
    .map((id, idx) => ({ ...playersById[id], _idx: idx }))

// filled in; ties are not expected (the app's format always produces a winner) so any tied score
// is defensively skipped rather than guessed. Score diff only accumulates from matches WON.

  history.forEach((h) => {
    const scoreA = parseInt(h.scoreA, 10);
    const scoreB = parseInt(h.scoreB, 10);

      if (!stats[id]) return;

      stats[id].matches += 1;

// Court fee / shuttle fee are still computed (they feed Total) but intentionally not returned
// as separate columns, per the request to hide them from the Bills table.
// The single source of truth for "what does this player owe" — used by the live Bills table,

function computeBillRows(players, shuttlePrice, courtFeePerHour, courtFeeMode, totalCourtFee) {
  const shuttlePriceNum = parseFloat(shuttlePrice) || 0;
  const perGameShuttleFee = shuttlePriceNum / 4;

  // Two different ways to work out each player's court fee, always rounded up to the nearest
  // peso per player, per the house rule:

    getCourtCost = (p) => (p.matchesToday >= 1 ? Math.ceil(perPlayerShare) : 0);

    const perGameCourtFee = (parseFloat(courtFeePerHour) || 0) / 3 / 4;

    .map((p) => {

// Turns a sorted list into "dense" rank numbers: ties share a rank, and the next distinct rank

  const ranks = [];
  let rank = 0;

// Renders the table to a PNG, then hands it to the device's native share sheet if the browser

// Renders the export node (Bills or Ranking table) to a canvas via html2canvas. This is the

async function renderExportCanvas(title, columns, rows, colors) {
  const node = buildExportNode(title, columns, rows, colors);
  document.body.appendChild(node);
  try {
    return await window.html2canvas(node, { backgroundColor: colors.cream, scale: 2 });
  } finally {
    document.body.removeChild(node);

  const shareNow = async () => {
    try {
      const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
      const file = new File([blob], fileName, { type: "image/png" });
      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({ files: [file], title });
      }
    } catch (err) { /* cancelled or unsupported — the image above still works either way */ }
  };
  return (
    <div className="bq-modal-overlay" onClick={onClose}>
      <div className="bq-modal bq-export-modal" onClick={(e) => e.stopPropagation()} style={{ maxWidth: 420 }}>
        <div className="bq-modal-head"><h3>{title}</h3><button className="bq-icon-btn" onClick={onClose}><X size={18} /></button></div>
        <div className="bq-modal-body bq-export-scroll">
          <p className="bq-muted-sm">Press and hold the image below to Save, Copy, or Share it — works the same in Safari and Chrome.</p>
          <img src={dataUrl} alt={title} style={{ width: "100%", borderRadius: 10, border: "1px solid #DDD6C2", display: "block" }} />
        </div>
        <button className="bq-btn bq-btn-primary bq-export-share-btn" onClick={shareNow}>Share…</button>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/*  Storage helpers (personal, per-user)                                   */
/* ---------------------------------------------------------------------- */
// Pure client-side storage: every device/browser keeps its own independent data.
// No account, no sync, no server — this is what makes the app work standalone.
async function loadKey(key, fallback) {
  try { const raw = localStorage.getItem(key); return raw !== null ? JSON.parse(raw) : fallback; }
  catch { return fallback; }
}
async function saveKey(key, value) {
  try { localStorage.setItem(key, JSON.stringify(value)); } catch { /* storage full or blocked */ }
}
// This page is always opened as casual.html?session=<id> from the Undercover
// landing page (index.html). The session id becomes a prefix on every PER-SESSION storage key,
// so two different sessions never see each other's roster/queue/history/bills. Settings that
// should follow you everywhere (theme, font, Gemini keys, fee amounts) deliberately do NOT use
// this prefix — they keep their old plain key names, so they stay "global".
function getSessionId() {
  const params = new URLSearchParams(window.location.search);
  return params.get("session") || "default";
}
const SESSION_ID = getSessionId();
function sessionKey(key) { return `${key}__${SESSION_ID}`; }
// One-time migration for people upgrading from the pre-session version of this app: your data
// was saved under plain keys like "bq_players" back then. The very first time the "default"
// session loads after this update, copy each old key over to its new namespaced slot — so your
// existing roster, queue, courts, and history show up exactly as you left them, instead of
// looking wiped just because the storage keys changed shape.
function migrateLegacyDataIfNeeded() {
  if (SESSION_ID !== "default") return; // only the pre-existing session needs this
  const LEGACY_KEYS = ["bq_players", "bq_queue", "bq_courts", "bq_pending", "bq_playedGroups", "bq_history", "bq_meta"];
  const alreadyMigrated = localStorage.getItem(sessionKey("bq_players")) !== null;
  if (alreadyMigrated) return;
  const hadLegacyData = localStorage.getItem("bq_players") !== null;
  if (!hadLegacyData) return;
  LEGACY_KEYS.forEach((key) => {
    const raw = localStorage.getItem(key);
    if (raw !== null) localStorage.setItem(sessionKey(key), raw);
  });
}
migrateLegacyDataIfNeeded();

// Shows a brief dark bubble above its child: on hover for mouse/desktop, or on a ~500ms
// press-and-hold for touch devices (mobile/tablet), matching how native tooltips don't
// reliably support long-press. Dismisses on mouse-leave / touch-end.
function Tooltip({ text, children }) {
  const [visible, setVisible] = useState(false);
  const timerRef = React.useRef(null);
  const clearTimer = () => { if (timerRef.current) { clearTimeout(timerRef.current); timerRef.current = null; } };
  const startPress = () => { clearTimer(); timerRef.current = setTimeout(() => setVisible(true), 500); };
  const endPress = () => { clearTimer(); setVisible(false); };
  return (
    <span
      className="bq-tooltip-wrap"
      onMouseEnter={() => setVisible(true)}
      onMouseLeave={() => setVisible(false)}
      onTouchStart={startPress}
      onTouchEnd={endPress}
      onTouchCancel={endPress}
    >
      {children}
      {visible && <span className="bq-tooltip-bubble" role="tooltip">{text}</span>}
    </span>
  );
}
// A small (i) icon that toggles a text explanation on click/tap — works identically on desktop
// and mobile (no hover or long-press needed), and the bubble wraps text instead of staying on
// one line, since explanations tend to be longer than a button's quick-glance tooltip.
function InfoTip({ text }) {
  const [open, setOpen] = useState(false);
  const wrapRef = React.useRef(null);
  useEffect(() => {
    if (!open) return;
    const onOutside = (e) => { if (wrapRef.current && !wrapRef.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", onOutside);
    document.addEventListener("touchstart", onOutside);
    return () => { document.removeEventListener("mousedown", onOutside); document.removeEventListener("touchstart", onOutside); };
  }, [open]);
  return (
    <span className="bq-infotip-wrap" ref={wrapRef}>
      <button type="button" className="bq-infotip-btn" onClick={() => setOpen((o) => !o)} aria-label="More info">
        <Info size={13} />
      </button>
      {open && <span className="bq-infotip-bubble" role="tooltip">{text}</span>}
    </span>
  );
}

// Safely evaluates a simple arithmetic string (digits, + - * / ( ) . and spaces only). Anything
// containing another character is rejected outright — this is what makes it safe to run through
// JavaScript's Function() constructor: by the time it gets here, there's no way for it to contain
// actual code, only numbers and math operators.
function evaluateSimpleFormula(input) {
  const clean = String(input || "").trim();
  if (clean === "") return null; // empty is a deliberate "clear this value" case
  if (!/^[0-9+\-*/.() ]+$/.test(clean)) return NaN;
  try {
    const result = Function(`"use strict"; return (${clean});`)();
    return typeof result === "number" && Number.isFinite(result) ? result : NaN;
  } catch {
    return NaN;
  }
}
// If the full string doesn't evaluate (e.g. "50+" — an unfinished formula), trims one character
// off the end and tries again, repeating until something valid is found. A complete formula like
// "(5+3)" still succeeds on the very first try, so nothing is trimmed unless it's actually needed.
function findLargestValidPrefix(input) {
  let candidate = String(input || "").trim();
  while (candidate.length > 0) {
    const result = evaluateSimpleFormula(candidate);
    if (typeof result === "number" && Number.isFinite(result)) return result;
    candidate = candidate.slice(0, -1).trimEnd();
  }
  return NaN;
}
// A text input that behaves like a spreadsheet cell: you can type a formula (e.g. "50+30"), and
// it only gets evaluated when you click away or press Enter — not on every keystroke, since a
// half-typed formula like "50+" isn't valid yet. If what's left over after trimming still isn't
// salvageable at all, it reverts to whatever the last good value was.
function MiscFormulaInput({ value, onCommit, title }) {
  const [draft, setDraft] = useState(value || "");
  const [focused, setFocused] = useState(false);
  const [calcOpen, setCalcOpen] = useState(false);
  useEffect(() => { setDraft(value || ""); }, [value]);
  const handleChange = (e) => {
    setDraft(e.target.value.replace(/[^0-9+\-*/.() ]/g, ""));
  };
  const commit = () => {
    const trimmed = draft.trim();
    if (trimmed === "") { setDraft(""); onCommit(""); return; }
    const result = findLargestValidPrefix(trimmed);
    if (Number.isFinite(result)) {
      const rounded = Math.round(result * 100) / 100;
      setDraft(String(rounded));
      onCommit(String(rounded));
    } else {
      setDraft(value || ""); // nothing salvageable — revert, don't save it
    }
  };
  // Tapping the calculator icon shouldn't blur the input first (that would run commit() on
  // whatever partial text is sitting there) — preventDefault on mousedown stops the input from
  // ever losing focus in the first place, so the icon stays visible while the popup is open too.
  const applyCalcResult = (result) => {
    setDraft(result);
    onCommit(result);
    setCalcOpen(false);
  };
  return (
    <span className="bq-formula-wrap">
      <input
        type="text" inputMode="decimal" placeholder="0" className="bq-pay-misc-input"
        value={draft}
        onChange={handleChange}
        onFocus={() => setFocused(true)}
        onBlur={() => { commit(); setFocused(false); }}
        onKeyDown={(e) => { if (e.key === "Enter") e.currentTarget.blur(); }}
        title={title}
      />
      {focused && (
        <button
          type="button"
          className="bq-calc-trigger"
          onMouseDown={(e) => e.preventDefault()}
          onClick={() => setCalcOpen(true)}
          title="Open calculator"
          aria-label="Open calculator"
        >
          <CalcIcon size={13} />
        </button>
      )}
      {calcOpen && <CalcPopup onResult={applyCalcResult} onClose={() => setCalcOpen(false)} />}
    </span>
  );
}

/* ---------------------------------------------------------------------- */
/*  Calculator popup — used by MiscFormulaInput so Misc & Total Court Fee  */
/*  have full +, -, *, / on mobile without fighting the native keyboard    */
/* ---------------------------------------------------------------------- */
function CalcPopup({ onResult, onClose }) {
  const [expr, setExpr] = useState("");
  const press = (val) => setExpr((e) => e + val);
  const backspace = () => setExpr((e) => e.slice(0, -1));
  const clear = () => setExpr("");
  const equals = () => {
    const result = findLargestValidPrefix(expr.trim());
    if (Number.isFinite(result)) {
      onResult(String(Math.round(result * 100) / 100));
    } else {
      onClose();
    }
  };
  const ROWS = [
    ["7", "8", "9", "÷"],
    ["4", "5", "6", "×"],
    ["1", "2", "3", "−"],
    ["C", "0", ".", "+"],
  ];
  const SYMBOL_TO_OP = { "÷": "/", "×": "*", "−": "-" };
  return (
    <div className="bq-calc-overlay" onClick={onClose}>
      <div className="bq-calc" onClick={(e) => e.stopPropagation()}>
        <div className="bq-calc-display">{expr || "0"}</div>
        <div className="bq-calc-grid">
          {ROWS.flat().map((k) => (
            <button
              key={k}
              type="button"
              className={`bq-calc-key ${"+−×÷".includes(k) ? "bq-calc-key-op" : ""}`}
              onClick={() => (k === "C" ? clear() : press(SYMBOL_TO_OP[k] || k))}
            >
              {k}
            </button>
          ))}
          <button type="button" className="bq-calc-key bq-calc-key-wide" onClick={backspace}>⌫</button>
          <button type="button" className="bq-calc-key bq-calc-key-wide bq-calc-key-equals" onClick={equals}>=</button>
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/*  Main App                                                                */
/* ---------------------------------------------------------------------- */
function App() {
  const [loaded, setLoaded] = useState(false);
  const [players, setPlayers] = useState([]);
  const [queue, setQueue] = useState([]);
  const [courts, setCourts] = useState([]);
  const [pendingMatches, setPendingMatches] = useState([]);
  const [playedGroups, setPlayedGroups] = useState([]);
  const [history, setHistory] = useState([]);
  const [shuttlePrice, setShuttlePriceState] = useState("");
  const [courtFeePerHour, setCourtFeePerHourState] = useState("");
  const [courtFeeMode, setCourtFeeMode] = useState("perGame"); // 'perGame' | 'sharing'
  const [totalCourtFee, setTotalCourtFeeState] = useState("");
  const [geminiKeys, setGeminiKeys] = useState(["", "", ""]);
  const [geminiKeyIndex, setGeminiKeyIndex] = useState(0);
  const geminiKey = geminiKeys[geminiKeyIndex] || "";
  const [theme, setTheme] = useState("green");
  const [fontChoice, setFontChoice] = useState("manrope");
  const [fontSizeChoice, setFontSizeChoice] = useState("medium");
  const [tab, setTab] = useState("courts");
  const [toast, setToast] = useState(null);
  const [manualOpen, setManualOpen] = useState(false);
  const [lastResetAt, setLastResetAt] = useState(null);
  const [sessionDateLabel, setSessionDateLabel] = useState("");
  const [resetConfirmOpen, setResetConfirmOpen] = useState(false);
  const [resetQueueConfirmOpen, setResetQueueConfirmOpen] = useState(false);
  const [pendingIdleMatch, setPendingIdleMatch] = useState(null); // { courtId, court } awaiting the idle-gap confirm

  const playersById = Object.fromEntries(players.map((p) => [p.id, p]));

  /* ---------- load (no automatic reset — see resetDay() for the manual, confirmed version) ---------- */
  useEffect(() => {
    (async () => {
      let p = await loadKey(sessionKey("bq_players"), null);
      let q = await loadKey(sessionKey("bq_queue"), []);
      let c = await loadKey(sessionKey("bq_courts"), [
        { id: uid("court"), label: "Court 1", match: null },
        { id: uid("court"), label: "Court 2", match: null },
      ]);
      let pend = await loadKey(sessionKey("bq_pending"), []);
      let groups = await loadKey(sessionKey("bq_playedGroups"), []);
      let h = await loadKey(sessionKey("bq_history"), []);
      let meta = await loadKey(sessionKey("bq_meta"), { lastResetAt: null });
      let settings = await loadKey("bq_settings", { shuttlePrice: 0, courtFeePerHour: 0, courtFeeMode: "perGame", totalCourtFee: 0 });
      let gKeys = await loadKey("bq_geminiKeys", ["", "", ""]);
      let gIdx = await loadKey("bq_geminiKeyIndex", 0);
      let appearance = await loadKey("bq_appearance", { theme: "green", font: "manrope", fontSize: "medium" });

      if (p === null) p = [];
      p = p.map((pl) => ({ ...pl, sitOutStreak: pl.sitOutStreak ?? 0, shuttleGamesToday: pl.shuttleGamesToday ?? 0, miscAdjustment: pl.miscAdjustment !== undefined && String(pl.miscAdjustment) !== "0" ? String(pl.miscAdjustment) : "", paidToday: pl.paidToday ?? false }));
      c = c.map((court) => ({ ...court, needsShuttle: court.needsShuttle ?? false }));

      setPlayers(p); setQueue(q); setCourts(c); setPendingMatches(pend); setPlayedGroups(groups); setHistory(h);
      setShuttlePriceState(settings.shuttlePrice !== undefined && String(settings.shuttlePrice) !== "0" ? String(settings.shuttlePrice) : ""); setCourtFeePerHourState(settings.courtFeePerHour !== undefined && String(settings.courtFeePerHour) !== "0" ? String(settings.courtFeePerHour) : "");
      setCourtFeeMode(settings.courtFeeMode === "sharing" ? "sharing" : "perGame");
      setTotalCourtFeeState(settings.totalCourtFee !== undefined && String(settings.totalCourtFee) !== "0" ? String(settings.totalCourtFee) : "");
      setGeminiKeys(Array.isArray(gKeys) && gKeys.length === 3 ? gKeys : ["", "", ""]);
      setGeminiKeyIndex(Number.isInteger(gIdx) && gIdx >= 0 && gIdx < 3 ? gIdx : 0);
      setTheme(THEMES[appearance.theme] ? appearance.theme : "green");
      setFontChoice(FONT_OPTIONS[appearance.font] ? appearance.font : "manrope");
      setFontSizeChoice(FONT_SIZES[appearance.fontSize] ? appearance.fontSize : "medium");
      let activities = await loadKey("uc_activities", []);
      const thisActivity = Array.isArray(activities) ? activities.find((a) => a.id === SESSION_ID) : null;
      setSessionDateLabel(thisActivity ? thisActivity.label : new Date().toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" }));
      setLastResetAt(meta.lastResetAt || null);
      setLoaded(true);
    })();
  }, []);

  useEffect(() => { if (loaded) saveKey(sessionKey("bq_players"), players); }, [players, loaded]);
  useEffect(() => { if (loaded) saveKey(sessionKey("bq_queue"), queue); }, [queue, loaded]);
  useEffect(() => { if (loaded) saveKey(sessionKey("bq_courts"), courts); }, [courts, loaded]);
  useEffect(() => { if (loaded) saveKey(sessionKey("bq_pending"), pendingMatches); }, [pendingMatches, loaded]);
  useEffect(() => { if (loaded) saveKey(sessionKey("bq_playedGroups"), playedGroups); }, [playedGroups, loaded]);
  useEffect(() => { if (loaded) saveKey(sessionKey("bq_history"), history); }, [history, loaded]);
  useEffect(() => { if (loaded) saveKey("bq_settings", { shuttlePrice, courtFeePerHour, courtFeeMode, totalCourtFee }); }, [shuttlePrice, courtFeePerHour, courtFeeMode, totalCourtFee, loaded]);
  useEffect(() => { if (loaded) saveKey("bq_geminiKeys", geminiKeys); }, [geminiKeys, loaded]);
  useEffect(() => { if (loaded) saveKey("bq_geminiKeyIndex", geminiKeyIndex); }, [geminiKeyIndex, loaded]);
  useEffect(() => { if (loaded) saveKey("bq_appearance", { theme, font: fontChoice, fontSize: fontSizeChoice }); }, [theme, fontChoice, fontSizeChoice, loaded]);

  const setShuttlePrice = (v) => setShuttlePriceState(sanitizeNumeric(v, false));
  const setCourtFeePerHour = (v) => setCourtFeePerHourState(sanitizeNumeric(v, false));
  const setTotalCourtFee = (v) => setTotalCourtFeeState(sanitizeNumeric(v, false));
  const setPlayerMisc = (id, value) => setPlayers((prev) => prev.map((p) => (p.id === id ? { ...p, miscAdjustment: sanitizeNumeric(value, true) } : p)));
  const togglePaid = (id) => setPlayers((prev) => prev.map((p) => (p.id === id ? { ...p, paidToday: !p.paidToday } : p)));

  const deleteHistoryEntry = (id) => {
    setHistory((prev) => {
      const entry = prev.find((h) => h.id === id);
      if (!entry) return prev;
      const ids = [...(entry.teamAIds || []), ...(entry.teamBIds || [])];
      if (ids.length) {
        setPlayers((pl) => pl.map((p) => (ids.includes(p.id)
          ? { ...p, matchesToday: Math.max(0, p.matchesToday - 1), shuttleGamesToday: entry.shuttleUsed ? Math.max(0, (p.shuttleGamesToday || 0) - 1) : p.shuttleGamesToday }
          : p)));
        setPlayedGroups((g) => { const idx = g.lastIndexOf(groupKey(ids)); if (idx === -1) return g; const next = [...g]; next.splice(idx, 1); return next; });
      }
      return prev.filter((h) => h.id !== id);
    });
  };
  const clearHistory = () => setHistory([]);

  useEffect(() => { if (!toast) return; const t = setTimeout(() => setToast(null), 3400); return () => clearTimeout(t); }, [toast]);
  const notify = (msg, kind = "info") => setToast({ msg, kind });

  // The full-wipe step used by Reset Data — clears this session's queue, courts, history, and
  // every player's stats (matches/shuttle games/misc/paid), but leaves the roster itself and all
  // Settings untouched. There's no archive step anymore: each game-day already lives as its own
  // isolated session (see sessionKey()), and the landing page's Activities list is what lets you
  // come back to a past session's Bills later — nothing needs to be snapshotted here first.
  const wipeDayData = () => {
    setPendingMatches([]);
    setPlayedGroups([]);
    setQueue([]);
    setHistory([]);
    setCourts((prev) => prev.map((c) => ({ ...c, match: null, needsShuttle: false })));
    setPlayers((prev) => prev.map((p) => ({ ...p, matchesToday: 0, sitOutStreak: 0, shuttleGamesToday: 0, miscAdjustment: "", paidToday: false })));
    const now = Date.now();
    setLastResetAt(now);
    saveKey(sessionKey("bq_meta"), { lastResetAt: now });
  };
  const resetDay = () => {
    wipeDayData();
    setResetConfirmOpen(false);
    notify("Data reset — queue, courts, history, and player stats are cleared. Roster untouched.", "success");
  };
  // "Reset Courts & Queue" — the lighter sibling of Reset Data. Only touches the waiting pool,
  // pending matches, and whatever's live on the courts right now. History, Bills, and the
  // roster are all left exactly as they are — this is for "the rotation's a mess, let me
  // clear it" without erasing the day's actual record.
  const resetCourtsQueue = () => {
    setPendingMatches([]);
    setPlayedGroups([]);
    setQueue([]);
    setCourts((prev) => prev.map((c) => ({ ...c, match: null, needsShuttle: false })));
    setResetQueueConfirmOpen(false);
    notify("Courts & queue cleared. History and Bills were not touched.", "success");
  };
  // "Clear Roster" — the roster's own reset: removes every player. Doesn't touch history or Settings.
  const clearRoster = () => {
    setPlayers([]);
    setQueue([]);
    setPendingMatches([]);
    setCourts((prev) => prev.map((c) => ({ ...c, match: null, needsShuttle: false })));
    notify("Roster cleared — all players removed.", "success");
  };

  // Self-heal: drop any queue entry or pending match that points at a player who no longer
  // exists, so a stale id can never resurface as a blank slot in a future match. Also strips
  // duplicate ids (keeping the first occurrence) — a safety net against the same player ever
  // being double-booked into two matches at once, regardless of which code path caused it.
  useEffect(() => {
    if (!loaded) return;
    setQueue((prev) => {
      const seen = new Set();
      const clean = prev.filter((id) => {
        if (!playersById[id] || seen.has(id)) return false;
        seen.add(id);
        return true;
      });
      return clean.length !== prev.length ? clean : prev;
    });
    setPendingMatches((prev) => {
      const valid = []; const releasedIds = [];
      prev.forEach((m) => {
        const ids = [...m.teamA, ...m.teamB];
        if (ids.length === 4 && ids.every((id) => playersById[id])) valid.push(m);
        else releasedIds.push(...ids.filter((id) => playersById[id]));
      });
      if (valid.length !== prev.length) {
        if (releasedIds.length) setQueue((q) => [...new Set([...q, ...releasedIds])]);
        return valid;
      }
      return prev;
    });
  }, [players, loaded]); // eslint-disable-line react-hooks/exhaustive-deps

  /* ---------- player management ---------- */
  const addPlayer = (name, level, gender) => {
    if (!name.trim()) return;
    setPlayers((prev) => [...prev, { id: uid("pl"), name: name.trim(), level, gender, matchesToday: 0, sitOutStreak: 0, shuttleGamesToday: 0, miscAdjustment: "", paidToday: false }]);
    notify(`${name.trim()} added to roster.`, "success");
  };
  const editPlayer = (id, fields) => setPlayers((prev) => prev.map((p) => (p.id === id ? { ...p, ...fields } : p)));
  const deletePlayer = (id) => {
    setPlayers((prev) => prev.filter((p) => p.id !== id));
    setQueue((prev) => prev.filter((qid) => qid !== id));
    setPendingMatches((prev) => prev.filter((m) => !m.teamA.includes(id) && !m.teamB.includes(id)));
    setCourts((prev) => prev.map((c) => (c.match && (c.match.teamA.includes(id) || c.match.teamB.includes(id)) ? { ...c, match: null } : c)));
  };

  /* ---------- reserved players (queued for a pending match or on court) ---------- */
  const reservedIds = new Set([
    ...courts.flatMap((c) => (c.match ? [...c.match.teamA, ...c.match.teamB] : [])),
    ...pendingMatches.flatMap((m) => [...m.teamA, ...m.teamB]),
  ]);

  /* ---------- queue management ---------- */
  const addToQueue = (id) => { if (queue.includes(id) || reservedIds.has(id)) return; setQueue((prev) => [...prev, id]); };
  const addAllToQueue = () => {
    const missing = players.filter((p) => !queue.includes(p.id) && !reservedIds.has(p.id)).map((p) => p.id);
    setQueue((prev) => [...prev, ...missing]);
  };
  const removeFromQueue = (id) => setQueue((prev) => prev.filter((qid) => qid !== id));
  const moveInQueue = (id, dir) => {
    setQueue((prev) => {
      const i = prev.indexOf(id); const j = i + dir;
      if (i < 0 || j < 0 || j >= prev.length) return prev;
      const next = [...prev]; [next[i], next[j]] = [next[j], next[i]]; return next;
    });
  };

  /* ---------- court management ---------- */
  const addCourt = () => setCourts((prev) => {
    const nextNum = 1 + prev.reduce((max, c) => Math.max(max, parseInt((c.label.match(/\d+/) || [0])[0], 10) || 0), 0);
    return [...prev, { id: uid("court"), label: `Court ${nextNum}`, match: null, needsShuttle: false }];
  });
  const removeCourt = (id) => setCourts((prev) => { const c = prev.find((x) => x.id === id); return c?.match ? prev : prev.filter((x) => x.id !== id); });
  const toggleShuttleRequest = (courtId) => setCourts((prev) => prev.map((c) => (c.id === courtId ? { ...c, needsShuttle: !c.needsShuttle } : c)));

  // The actual "apply a completed match" effect — takes an explicit court snapshot rather than
  // re-reading from state, so it still works correctly even if state was just wiped by an
  // archive that happened moments earlier (see completeMatch below).
  const performCompleteMatch = (courtId, court) => {
    if (!court?.match) return;
    const ids = [...court.match.teamA, ...court.match.teamB];
    const shuttleUsed = !!court.needsShuttle;
    setPlayers((pl) => pl.map((p) => (ids.includes(p.id)
      ? { ...p, matchesToday: p.matchesToday + 1, shuttleGamesToday: (p.shuttleGamesToday || 0) + (shuttleUsed ? 1 : 0) }
      : p)));
    setPlayedGroups((g) => [...g, groupKey(ids)].slice(-400));
    setHistory((h) => [{
      id: uid("hist"), time: Date.now(), court: court.label, category: court.match.category, shuttleUsed,
      teamAIds: court.match.teamA, teamBIds: court.match.teamB,
      teamA: court.match.teamA.map((id) => playersById[id]?.name || "?"),
      teamB: court.match.teamB.map((id) => playersById[id]?.name || "?"),
      scoreA: "", scoreB: "",
    }, ...h].slice(0, 500));
    setQueue((q) => [...q, ...ids]);
    setCourts((prev) => prev.map((c) => (c.id === courtId ? { ...c, match: null, needsShuttle: false } : c)));
  };
  // Idle-gap check: only relevant if there IS a previous match in this session and at least
  // 1 hour has passed since it was recorded. This no longer cares which calendar day it was —
  // sessions are already isolated by sessionKey(), so the only question is "has it been a
  // while", not "did midnight pass".
  const shouldPromptIdleWarning = () => {
    if (history.length === 0) return false;
    const last = history[0]; // history is newest-first
    const hoursSince = (Date.now() - last.time) / (1000 * 60 * 60);
    return hoursSince >= 1;
  };
  const completeMatch = (courtId) => {
    const court = courts.find((c) => c.id === courtId);
    if (!court?.match) return;
    if (shouldPromptIdleWarning()) {
      setPendingIdleMatch({ courtId, court }); // snapshot taken now, before the modal decides
      return;
    }
    performCompleteMatch(courtId, court);
  };
  // "Yes, add it" — just logs the match normally, gap or no gap.
  const confirmIdleMatch = () => {
    const pending = pendingIdleMatch;
    setPendingIdleMatch(null);
    if (pending) performCompleteMatch(pending.courtId, pending.court);
  };
  // "Cancel" — backs out entirely; the match stays live on its court, unlogged.
  const cancelIdleMatch = () => setPendingIdleMatch(null);
  // Scores are digits-only, blank by default (no forced "0" to delete before typing).
  const setHistoryScore = (id, field, value) => {
    const clean = value.replace(/[^0-9]/g, "").slice(0, 3);
    setHistory((prev) => prev.map((h) => (h.id === id ? { ...h, [field]: clean } : h)));
  };
  // Toggles whether a PAST match used a new shuttlecock, correcting the actual shuttle-game
  // count on the 4 players involved (not just relabeling it) — so Payment/Bills stays accurate.
  // Players since deleted from the roster are automatically skipped: .map only touches players
  // that still exist, so there's nothing extra to check for.
  const toggleShuttleUsed = (historyId) => {
    const entry = history.find((h) => h.id === historyId);
    if (!entry) return;
    const willBeUsed = !entry.shuttleUsed;
    const delta = willBeUsed ? 1 : -1;
    const ids = [...(entry.teamAIds || []), ...(entry.teamBIds || [])];
    setPlayers((prev) => prev.map((p) => (ids.includes(p.id)
      ? { ...p, shuttleGamesToday: Math.max(0, (p.shuttleGamesToday || 0) + delta) }
      : p)));
    setHistory((prev) => prev.map((h) => (h.id === historyId ? { ...h, shuttleUsed: willBeUsed } : h)));
  };
  const cancelMatch = (courtId) => {
    setCourts((prev) => {
      const court = prev.find((c) => c.id === courtId);
      if (!court?.match) return prev;
      const ids = [...court.match.teamA, ...court.match.teamB];
      setQueue((q) => [...ids, ...q]);
      return prev.map((c) => (c.id === courtId ? { ...c, match: null } : c));
    });
  };

  /* ---------- pending match queue ---------- */
  const addPendingMatches = (matches, source) => {
    const built = matches
      .filter(isCompleteMatch)
      .map((m) => ({
        id: uid("pm"),
        teamA: m.teamA.map((p) => p.id),
        teamB: m.teamB.map((p) => p.id),
        category: m.category,
        source,
        repeatForced: !!m.repeatForced,
        createdAt: Date.now(),
      }));
    if (built.length) setPendingMatches((prev) => [...prev, ...built]);
    return built;
  };
  const consumeFromQueueAndResetStreak = (matchedIds) => {
    setQueue((prev) => prev.filter((id) => !matchedIds.has(id)));
    setPlayers((prev) => prev.map((p) => (matchedIds.has(p.id) ? { ...p, sitOutStreak: 0 } : p)));
  };
  const bumpLeftoverStreak = (poolIds, matchedIds) => {
    setPlayers((prev) => prev.map((p) => (poolIds.has(p.id) && !matchedIds.has(p.id) ? { ...p, sitOutStreak: (p.sitOutStreak || 0) + 1 } : p)));
  };
  const cancelPendingMatch = (matchId) => {
    setPendingMatches((prev) => {
      const m = prev.find((x) => x.id === matchId);
      if (!m) return prev;
      setQueue((q) => [...m.teamA, ...m.teamB, ...q]);
      return prev.filter((x) => x.id !== matchId);
    });
  };
  const sendPendingToCourt = (matchId, courtId) => {
    const match = pendingMatches.find((m) => m.id === matchId);
    const court = courts.find((c) => c.id === courtId);
    if (!match || !court || court.match) { notify("That court isn't free.", "warn"); return; }
    setCourts((prev) => prev.map((c) => (c.id === courtId ? { ...c, match: { teamA: match.teamA, teamB: match.teamB, category: match.category, startedAt: Date.now() } } : c)));
    setPendingMatches((prev) => prev.filter((m) => m.id !== matchId));
    notify(`Match sent to ${court.label}.`, "success");
  };
  // Build Manually's "Start now" button: takes a freshly-built match object directly (never
  // routes it through pendingMatches first), so there's no stale-state lookup to fail. This is
  // what the old two-step add-then-send version got wrong.
  const startManualMatchNow = (m, courtId) => {
    const court = courts.find((c) => c.id === courtId);
    if (!isCompleteMatch(m) || !court || court.match) { notify("That court isn't free.", "warn"); return; }
    setCourts((prev) => prev.map((c) => (c.id === courtId
      ? { ...c, match: { teamA: m.teamA.map((p) => p.id), teamB: m.teamB.map((p) => p.id), category: m.category, startedAt: Date.now() } }
      : c)));
    consumeFromQueueAndResetStreak(new Set(m.players.map((p) => p.id)));
    notify(`Match sent to ${court.label}.`, "success");
  };
  const sendToFirstOpenCourt = (matchId) => {
    const open = courts.find((c) => !c.match);
    if (!open) { notify("No court is free yet — finish a match first.", "warn"); return; }
    sendPendingToCourt(matchId, open.id);
  };

  // Manual swap editing for pending matches. No penalty to sit-out streak either way — this is
  // the QM overriding fairness deliberately, not the player losing their place.
  const swapWithPool = (matchId, team, idx, incomingId) => {
    const match = pendingMatches.find((m) => m.id === matchId);
    if (!match) return;
    const outgoingId = match[team][idx];
    const updated = pendingMatches.map((m) => {
      if (m.id !== matchId) return m;
      const next = { ...m, teamA: [...m.teamA], teamB: [...m.teamB] };
      next[team][idx] = incomingId;
      return recomputeMatch(next, playersById);
    });
    setPendingMatches(updated);
    setQueue((q) => [outgoingId, ...q.filter((id) => id !== incomingId)]);
  };
  const swapWithSlot = (matchId, team, idx, targetMatchId, targetTeam, targetIdx) => {
    const match = pendingMatches.find((m) => m.id === matchId);
    const targetMatch = pendingMatches.find((m) => m.id === targetMatchId);
    if (!match || !targetMatch) return;
    const outgoingId = match[team][idx];
    const incomingId = targetMatch[targetTeam][targetIdx];
    if (matchId === targetMatchId) {
      const updated = pendingMatches.map((m) => {
        if (m.id !== matchId) return m;
        const next = { ...m, teamA: [...m.teamA], teamB: [...m.teamB] };
        next[team][idx] = incomingId;
        next[targetTeam][targetIdx] = outgoingId;
        return recomputeMatch(next, playersById);
      });
      setPendingMatches(updated);
      return;
    }
    const updated = pendingMatches.map((m) => {
      if (m.id === matchId) {
        const next = { ...m, teamA: [...m.teamA], teamB: [...m.teamB] };
        next[team][idx] = incomingId;
        return recomputeMatch(next, playersById);
      }
      if (m.id === targetMatchId) {
        const next = { ...m, teamA: [...m.teamA], teamB: [...m.teamB] };
        next[targetTeam][targetIdx] = outgoingId;
        return recomputeMatch(next, playersById);
      }
      return m;
    });
    setPendingMatches(updated);
  };

  /* ---------- generate a full series from the whole pool ---------- */
  const runGenerate = useCallback((categoryFilter) => {
    const pool = priorityQueue(queue, playersById);
    if (pool.length < 4) { notify("Need at least 4 players in the pool to form a match.", "warn"); return; }
    const groupSet = new Set(playedGroups);
    const { matches, leftover } = generateSeries(pool, groupSet, categoryFilter);
    if (matches.length === 0) { notify("No rule-compliant match could be formed from the current pool.", "warn"); return; }
    addPendingMatches(matches, "Rules engine");
    const matchedIds = new Set(matches.flatMap((m) => m.players.map((p) => p.id)));
    const poolIds = new Set(pool.map((p) => p.id));
    consumeFromQueueAndResetStreak(matchedIds);
    bumpLeftoverStreak(poolIds, matchedIds);
    const repeats = matches.filter((m) => m.repeatForced).length;
    notify(`Formed ${matches.length} match${matches.length > 1 ? "es" : ""} · ${leftover.length} still waiting${repeats ? ` · ${repeats} reused a prior grouping (no other option)` : ""}.`, "success");
  }, [queue, playersById, playedGroups]);

  const [aiLoading, setAiLoading] = useState(false);
  // Calls Gemini directly from this device with your own key — works fully standalone,
  // wherever this file is hosted or opened. Throws a human-readable error on failure instead
  // of swallowing it, so the UI can explain what actually went wrong.
  const callAiText = async (apiKey, prompt) => {
    if (!apiKey) throw new Error("Add your free Gemini API key below first (get one at aistudio.google.com).");
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`;
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ role: "user", parts: [{ text: prompt }] }],
        generationConfig: { responseMimeType: "application/json" },
      }),
    });
    const data = await response.json().catch(() => null);
    if (!response.ok) throw new Error(data?.error?.message || `Gemini request failed (HTTP ${response.status}).`);
    const text = (data?.candidates?.[0]?.content?.parts || []).map((p) => p.text || "").join("");
    if (!text.trim()) throw new Error("Gemini returned an empty response — it may have blocked the prompt, or the key/quota is invalid.");
    return text;
  };

  const askAiSeries = useCallback(async (categoryFilter) => {
    const providerLabel = "Gemini";
    const pool = priorityQueue(queue, playersById);
    if (pool.length < 4) { notify("Need at least 4 players in the pool to form a match.", "warn"); return; }
    setAiLoading(true);
    try {
      const compactPool = pool.map((p) => ({ id: p.id, name: p.name, level: p.level, gender: p.gender, matchesToday: p.matchesToday, sitOutStreak: p.sitOutStreak }));
      const avoidGroups = [...playedGroups].slice(-60).map((k) => k.split("|"));
      const prompt = `You are a badminton matchmaking assistant scheduling a full round for a queuing app.

PLAYER POOL (priority order — earlier players have waited longer or played less, and should be prioritized for inclusion):
${JSON.stringify(compactPool)}

GROUPS ALREADY PLAYED TODAY (avoid recreating these exact 4-player groups unless there is truly no other valid combination):
${JSON.stringify(avoidGroups)}

TASK: Form as many valid 4-player matches as possible from the pool, using each player AT MOST ONCE across all matches. Prioritize including players who appear earlier in the pool list (they have waited longer / played fewer matches) — nobody who could reasonably be included should be left out twice in a row.

RULES (must all hold for every match):
1. Split each match into teamA and teamB, 2 players each.
2. There are 4 levels: Beginner, Intermediate, Upper Intermediate, Advance. "Upper Intermediate" is a flexible level — treat it as EITHER "Intermediate" OR "Advance" (whichever makes a pairing legal). The only pairing that is ever banned is a literal Advance player teamed with a literal Beginner player (Upper Intermediate is never that literal Advance or Beginner, so Upper Intermediate can always partner a Beginner by presenting as Intermediate).
3. Both teams in a match must be able to present as the SAME 2-level composition as each other (using Upper Intermediate's flexibility where relevant). Example: a team of {Upper Intermediate, Beginner} can face another {Upper Intermediate, Beginner} team, or a literal {Intermediate, Beginner} team — both present as "Intermediate+Beginner".
4. Category must be one of "Men's Doubles" (both teams all-male), "Women's Doubles" (both teams all-female), or "Mixed Doubles" (each team has exactly one male and one female).
${categoryFilter ? `5. Every match's category MUST be "${categoryFilter}".` : `5. Don't default to one category systematically (e.g. always picking Mixed Doubles just because it's usually the easiest combination to find). Vary the category naturally across the matches you form, based on who's actually available in the pool, rather than favoring any one category by default.`}

Respond with ONLY raw JSON, no markdown fences, no commentary, in exactly this shape:
{"matches":[{"teamA":["<id>","<id>"],"teamB":["<id>","<id>"],"category":"Men's Doubles|Women's Doubles|Mixed Doubles","reason":"one short sentence"}]}`;

      const rawText = await callAiText(geminiKey.trim(), prompt);
      const clean = rawText.replace(/```json|```/g, "").trim();
      let parsed;
      try { parsed = JSON.parse(clean); } catch { throw new Error(`${providerLabel} didn't return valid JSON — try again, or use Generate Matches.`); }

      const usedIds = new Set();
      const validMatches = [];
      for (const raw of parsed.matches || []) {
        const teamA = (raw.teamA || []).map((id) => playersById[id]).filter(Boolean);
        const teamB = (raw.teamB || []).map((id) => playersById[id]).filter(Boolean);
        if (teamA.length !== 2 || teamB.length !== 2) continue;
        const ids = [...teamA, ...teamB].map((p) => p.id);
        if (ids.some((id) => usedIds.has(id))) continue; // no reuse across matches in this batch
        if (!ids.every((id) => queue.includes(id))) continue; // must come from the pool
        const levelOk = teamsCompatible(teamA.map((p) => p.level), teamB.map((p) => p.level));
        const category = detectCategory(teamA, teamB);
        if (!levelOk || !category || (categoryFilter && category !== categoryFilter)) continue;
        ids.forEach((id) => usedIds.add(id));
        validMatches.push({ teamA, teamB, category, players: [...teamA, ...teamB], reason: raw.reason });
      }

      // mop up anything the AI missed using the rules engine, from whatever's left
      const leftoverPool = pool.filter((p) => !usedIds.has(p.id));
      const groupSet = new Set(playedGroups);
      const { matches: fallbackMatches } = generateSeries(leftoverPool, groupSet, categoryFilter);
      fallbackMatches.forEach((m) => m.players.forEach((p) => usedIds.add(p.id)));

      const allMatches = [...validMatches, ...fallbackMatches];
      if (allMatches.length === 0) {
        notify(`${providerLabel} couldn't form a valid match either — try adding more players.`, "warn");
        return;
      }
      if (validMatches.length) addPendingMatches(validMatches, providerLabel);
      if (fallbackMatches.length) addPendingMatches(fallbackMatches, "Rules engine (fallback)");
      const poolIds = new Set(pool.map((p) => p.id));
      consumeFromQueueAndResetStreak(usedIds);
      bumpLeftoverStreak(poolIds, usedIds);
      notify(`${providerLabel} formed ${validMatches.length} match${validMatches.length !== 1 ? "es" : ""}${fallbackMatches.length ? `, rules engine added ${fallbackMatches.length} more` : ""}.`, "success");
    } catch (e) {
      const msg = e.message || "unknown error";
      const isQuota = /rate limit|quota|429/i.test(msg);
      const hint = isQuota ? " Try Generate Matches (instant, no AI needed), or wait a bit and retry." : "";
      notify(`${providerLabel} matchmaking failed: ${msg}.${hint}`, "warn");
    } finally {
      setAiLoading(false);
    }
  }, [queue, playersById, playedGroups, geminiKeyIndex]);

  const fontFamily = (FONT_OPTIONS[fontChoice] || FONT_OPTIONS.manrope).stack;
  const fontScale = FONT_SIZES[fontSizeChoice] ?? 1;
  const exportColors = { ...(THEMES[theme] || THEMES.green), ...SEMANTIC_COLORS };
  const rootStyle = { zoom: fontScale };

  if (!loaded) {
    return (
      <ThemeContext.Provider value={THEMES[theme] || THEMES.green}>
        <div className="bq-root bq-loading" style={rootStyle}><Loader2 className="bq-spin" size={28} /><span>Loading queue…</span><Styles fontFamily={fontFamily} /></div>
      </ThemeContext.Provider>
    );
  }

  return (
    <ThemeContext.Provider value={THEMES[theme] || THEMES.green}>
    <div className="bq-root" style={rootStyle}>
      <Styles fontFamily={fontFamily} />
      <Header sessionDateLabel={sessionDateLabel} />
      <TabBar tab={tab} setTab={setTab} counts={{ courts: courts.filter((c) => c.match).length, players: players.length, history: history.length }} />

      <main className="bq-main">
        {tab === "courts" && (
          <CourtsTab
            courts={courts} playersById={playersById} queue={queue} players={players}
            pendingMatches={pendingMatches} aiLoading={aiLoading}
            geminiKeyIndex={geminiKeyIndex} geminiKeys={geminiKeys}
            addCourt={addCourt} removeCourt={removeCourt} toggleShuttleRequest={toggleShuttleRequest}
            runGenerate={runGenerate} askAiSeries={askAiSeries}
            openManual={() => setManualOpen(true)}
            completeMatch={completeMatch} cancelMatch={cancelMatch}
            sendPendingToCourt={sendPendingToCourt} sendToFirstOpenCourt={sendToFirstOpenCourt} cancelPendingMatch={cancelPendingMatch}
            swapWithPool={swapWithPool} swapWithSlot={swapWithSlot}
            addToQueue={addToQueue} addAllToQueue={addAllToQueue} removeFromQueue={removeFromQueue} moveInQueue={moveInQueue}
            reservedIds={reservedIds}
          />
        )}
        {tab === "players" && (
          <PlayersTab players={players} addPlayer={addPlayer} editPlayer={editPlayer} deletePlayer={deletePlayer} addToQueue={addToQueue} queue={queue} reservedIds={reservedIds} clearRoster={clearRoster} />
        )}
        {tab === "history" && <HistoryTab history={history} deleteHistoryEntry={deleteHistoryEntry} clearHistory={clearHistory} setHistoryScore={setHistoryScore} toggleShuttleUsed={toggleShuttleUsed} />}
        {tab === "ranking" && <RankingTab players={players} history={history} />}
        {tab === "payment" && (
          <PaymentTab
            players={players} shuttlePrice={shuttlePrice} setShuttlePrice={setShuttlePrice} courtFeePerHour={courtFeePerHour} setCourtFeePerHour={setCourtFeePerHour}
            courtFeeMode={courtFeeMode} setCourtFeeMode={setCourtFeeMode} totalCourtFee={totalCourtFee} setTotalCourtFee={setTotalCourtFee}
            setPlayerMisc={setPlayerMisc} togglePaid={togglePaid} colors={exportColors}
          />
        )}
        {tab === "settings" && (
          <SettingsTab
            geminiKeys={geminiKeys} setGeminiKeys={setGeminiKeys}
            geminiKeyIndex={geminiKeyIndex} setGeminiKeyIndex={setGeminiKeyIndex}
            theme={theme} setTheme={setTheme}
            fontChoice={fontChoice} setFontChoice={setFontChoice}
            fontSizeChoice={fontSizeChoice} setFontSizeChoice={setFontSizeChoice}
          />
        )}
      </main>

      <footer className="bq-footer">
        <span className="bq-muted-sm">Last reset: {formatResetTime(lastResetAt)}</span>
        <div style={{ display: "flex", gap: 14 }}>
          <button className="bq-footer-reset-btn" onClick={() => setResetQueueConfirmOpen(true)}>Reset Courts &amp; Queue…</button>
          <button className="bq-footer-reset-btn" onClick={() => setResetConfirmOpen(true)}>Reset Data…</button>
        </div>
      </footer>

      {manualOpen && (
        <ManualMatchModal
          queue={queue} playersById={playersById} courts={courts}
          onClose={() => setManualOpen(false)}
          onAddPending={(m) => { addPendingMatches([m], "Manual"); consumeFromQueueAndResetStreak(new Set(m.players.map((p) => p.id))); setManualOpen(false); }}
          onStartNow={(m, courtId) => { startManualMatchNow(m, courtId); setManualOpen(false); }}
        />
      )}

      {resetConfirmOpen && (
        <ResetDayModal playerCount={players.length} onClose={() => setResetConfirmOpen(false)} onConfirm={resetDay} />
      )}

      {resetQueueConfirmOpen && (
        <ResetCourtsQueueModal onClose={() => setResetQueueConfirmOpen(false)} onConfirm={resetCourtsQueue} />
      )}

      {pendingIdleMatch && (
        <IdleWarningModal onConfirm={confirmIdleMatch} onCancel={cancelIdleMatch} />
      )}

      {toast && <div className={`bq-toast bq-toast-${toast.kind}`}>{toast.msg}</div>}
    </div>
    </ThemeContext.Provider>
  );
}

/* ---------------------------------------------------------------------- */
/*  Header + Tabs                                                          */
/* ---------------------------------------------------------------------- */
function Header({ sessionDateLabel }) {
  return (
    <header className="bq-header">
      <div className="bq-brand-row">
        <img src="undercover-logo-wide.png" alt="Undercover Badminton Club" className="bq-brand-logo" />
        <div className="bq-brand-text">
          <h1>Casual games</h1>
          <span className="bq-header-date">{sessionDateLabel}</span>

/* ---------------------------------------------------------------------- */
/*  Courts & Queue tab                                                     */
/* ---------------------------------------------------------------------- */
function CourtsTab({
  courts, playersById, queue, players, pendingMatches, aiLoading,
  geminiKeyIndex, geminiKeys,
  addCourt, removeCourt, toggleShuttleRequest, runGenerate, askAiSeries, openManual,
  completeMatch, cancelMatch, sendPendingToCourt, sendToFirstOpenCourt, cancelPendingMatch,
  swapWithPool, swapWithSlot,
  addToQueue, addAllToQueue, removeFromQueue, moveInQueue, reservedIds,
}) {
  const [showAdd, setShowAdd] = useState(false);
  const [categoryFilter, setCategoryFilter] = useState(null);
  const [editingMatchId, setEditingMatchId] = useState(null);
  const [swapPickerFor, setSwapPickerFor] = useState(null);
  const availableToAdd = players.filter((p) => !queue.includes(p.id) && !reservedIds.has(p.id));
  const openCourts = courts.filter((c) => !c.match);
  const geminiReady = (geminiKeys[geminiKeyIndex] || "").trim().length > 0;
  const matchNumberById = Object.fromEntries(pendingMatches.map((m, i) => [m.id, i + 1]));

  return (
    <div className="bq-courts-layout">
      <section className="bq-courts-col">
        <div className="bq-generate-bar">
          <div className="bq-chip-row">
            {["Men's Doubles", "Women's Doubles", "Mixed Doubles"].map((cat) => (
              <button key={cat} className={`bq-chip ${categoryFilter === cat ? "bq-chip-active" : ""}`} onClick={() => setCategoryFilter(categoryFilter === cat ? null : cat)}>{cat}</button>
            ))}
          </div>
          <div className="bq-row-gap">
            <Tooltip text="Instantly forms matches locally. Works fully offline.">
              <button className="bq-btn bq-btn-primary" onClick={() => runGenerate(categoryFilter)} disabled={aiLoading} title={aiLoading ? "Wait for Ask Gemini to finish first" : undefined}><Shuffle size={15} /> Generate matches</button>
            </Tooltip>
            <Tooltip text={geminiReady ? "Asks Gemini AI to suggest matches" : "Add a Gemini key in Settings first"}>
              <button className="bq-btn bq-btn-ghost" onClick={() => askAiSeries(categoryFilter)} disabled={aiLoading || !geminiReady}>
                {aiLoading ? <Loader2 size={15} className="bq-spin" /> : <Sparkles size={15} />} Ask Gemini
              </button>
            </Tooltip>
            <button className="bq-btn bq-btn-ghost" onClick={openManual} disabled={aiLoading} title={aiLoading ? "Wait for Ask Gemini to finish first" : undefined}><Wand2 size={15} /> Build manually</button>
          </div>
        </div>

        {pendingMatches.length > 0 && (
          <div className="bq-pending-section">
            <div className="bq-section-head"><h2>Pending Matches <span className="bq-muted-sm">({pendingMatches.length})</span></h2></div>
            <div className="bq-pending-row">
              {pendingMatches.map((m, i) => (
                <PendingMatchCard key={m.id} number={i + 1} match={m} playersById={playersById} openCourts={openCourts}
                  onSendFirst={() => sendToFirstOpenCourt(m.id)}
                  onSendTo={(courtId) => sendPendingToCourt(m.id, courtId)}
                  onCancel={() => cancelPendingMatch(m.id)}
                  isEditing={editingMatchId === m.id}
                  onToggleEdit={() => { setEditingMatchId(editingMatchId === m.id ? null : m.id); setSwapPickerFor(null); }}
                  swapPickerFor={swapPickerFor} setSwapPickerFor={setSwapPickerFor}
                  pendingMatches={pendingMatches} queue={queue} matchNumberById={matchNumberById}
                  onSwapWithPool={(team, idx, incomingId) => swapWithPool(m.id, team, idx, incomingId)}
                  onSwapWithSlot={(team, idx, targetMatchId, targetTeam, targetIdx) => swapWithSlot(m.id, team, idx, targetMatchId, targetTeam, targetIdx)}
                />
              ))}
            </div>
          </div>
        )}

        <div className="bq-section-head" style={{ marginTop: 16 }}>
          <h2>Courts</h2>
          <button className="bq-btn bq-btn-ghost" onClick={addCourt}><Plus size={15} /> Add court</button>
        </div>
        <div className="bq-court-grid">
          {courts.map((c) => (
            <CourtCard key={c.id} court={c} playersById={playersById} pendingCount={pendingMatches.length}
              onStartNext={() => pendingMatches[0] && sendPendingToCourt(pendingMatches[0].id, c.id)}
              onComplete={() => completeMatch(c.id)} onCancel={() => cancelMatch(c.id)} onRemove={() => removeCourt(c.id)}
              onToggleShuttle={() => toggleShuttleRequest(c.id)} />
          ))}
        </div>
      </section>

      <aside className="bq-queue-col">
        <div className="bq-section-head">
          <h2>Player Pool <span className="bq-muted-sm">({queue.length})</span></h2>
          <div className="bq-row-gap">
            <button className="bq-btn bq-btn-ghost" onClick={() => setShowAdd((s) => !s)}><UserPlus size={15} /> Add</button>
            <button className="bq-btn bq-btn-ghost" onClick={addAllToQueue}><ListPlus size={15} /> Add all</button>
          </div>
        </div>

        {showAdd && (
          <div className="bq-add-panel">
            {availableToAdd.length === 0 && <p className="bq-muted-sm">Everyone is already queued or playing.</p>}
            {availableToAdd.map((p) => (
              <button key={p.id} className="bq-add-row" onClick={() => addToQueue(p.id)}>
                <Avatar name={p.name} size={26} /><span className="bq-add-name">{p.name}</span><LevelBadge level={p.level} abbreviate /><Plus size={14} />
              </button>
            ))}
          </div>
        )}

        <ol className="bq-queue-list">
          {queue.length === 0 && <p className="bq-empty">Pool is empty. Add players to get started.</p>}
          {queue.map((id, idx) => {
            const p = playersById[id];
            if (!p) return null;
            return (
              <li key={id} className="bq-queue-item">
                <span className="bq-queue-pos">{idx + 1}</span>
                <Avatar name={p.name} size={30} />
                <div className="bq-queue-info">
                  <div className="bq-queue-name">{p.name} <GenderDot gender={p.gender} /></div>
                  <div className="bq-queue-meta">
                    <LevelBadge level={p.level} abbreviate />
                    <span className="bq-mono">{p.matchesToday} played</span>
                    {p.sitOutStreak > 0 && <span className="bq-streak-badge" title="Rounds sat out in a row">⏳ {p.sitOutStreak}</span>}
                  </div>
                </div>
                <div className="bq-queue-actions">
                  <button title="Move up" onClick={() => moveInQueue(id, -1)}><ChevronUp size={15} /></button>
                  <button title="Move down" onClick={() => moveInQueue(id, 1)}><ChevronDown size={15} /></button>
                  <button title="Remove from pool" onClick={() => removeFromQueue(id)}><X size={15} /></button>
                </div>
              </li>
            );
          })}
        </ol>
      </aside>
    </div>
  );
}

function PendingMatchCard({
  match, number, playersById, openCourts, onSendFirst, onSendTo, onCancel,

              swapPickerFor={swapPickerFor} setSwapPickerFor={setSwapPickerFor} pendingMatches={pendingMatches} queue={queue}
              matchNumberById={matchNumberById} onSwapWithPool={onSwapWithPool} onSwapWithSlot={onSwapWithSlot} />

          <>
            <TeamBlock ids={match.teamA} playersById={playersById} abbreviate />

            <TeamBlock ids={match.teamB} playersById={playersById} abbreviate />

          <Pencil size={12} /> {isEditing ? "Done editing" : "Edit players"}

        <div className="bq-pending-send">
          {openCourts.length === 0 && <span className="bq-muted-sm">No court free yet</span>}
          {openCourts.map((c) => (
            <button key={c.id} className="bq-court-pill" onClick={() => onSendTo(c.id)}>

// A team column in edit mode: each player is a clickable row that opens the swap picker.
function EditableTeam({ team, ids, playersById, matchId, swapPickerFor, setSwapPickerFor, pendingMatches, queue, matchNumberById, onSwapWithPool, onSwapWithSlot }) {
  return (
    <div className="bq-team">
      {ids.map((id, idx) => {
        const p = playersById[id];
        if (!p) return null;
        const isOpen = swapPickerFor && swapPickerFor.matchId === matchId && swapPickerFor.team === team && swapPickerFor.idx === idx;
        return (
          <div key={id} className="bq-team-player-edit-wrap">
            <button className="bq-team-player bq-team-player-edit" onClick={() => setSwapPickerFor(isOpen ? null : { matchId, team, idx })}>
              <Avatar name={p.name} size={30} />
              <div><div className="bq-team-name">{p.name}</div><LevelBadge level={p.level} abbreviate /></div>
              <Pencil size={11} className="bq-team-edit-icon" />
            </button>
            {isOpen && (
              <SwapPicker
                originId={id} originMatchId={matchId} originTeam={team} originIdx={idx}
                pendingMatches={pendingMatches} queue={queue} playersById={playersById} matchNumberById={matchNumberById}
                onClose={() => setSwapPickerFor(null)}
                onPick={(candidate) => {
                  if (candidate.type === "pool") onSwapWithPool(team, idx, candidate.id);
                  else onSwapWithSlot(team, idx, candidate.matchId, candidate.team, candidate.idx);
                  setSwapPickerFor(null);
                }}
              />
            )}
          </div>
        );
      })}
    </div>
  );
}
// Popover listing every swappable candidate: the other 3 in this match, the pool, and every
// other pending match's players. Court players (already in a live game) are excluded.
function SwapPicker({ originId, originMatchId, originTeam, originIdx, pendingMatches, queue, playersById, matchNumberById, onClose, onPick }) {
  const originPlayer = playersById[originId];
  const currentMatch = pendingMatches.find((m) => m.id === originMatchId);
  const sameMatchItems = [];
  if (currentMatch) {
    ["teamA", "teamB"].forEach((team) => {
      currentMatch[team].forEach((id, idx) => {
        if (team === originTeam && idx === originIdx) return;
        sameMatchItems.push({ id, team, idx, matchId: originMatchId });
      });
    });
  }
  const poolItems = queue.map((id) => ({ id, type: "pool" }));
  const otherMatchGroups = pendingMatches
    .filter((m) => m.id !== originMatchId)
    .map((m) => ({
      label: `Match ${matchNumberById[m.id] || "?"}`,
      items: [
        ...m.teamA.map((id, idx) => ({ id, team: "teamA", idx, matchId: m.id })),
        ...m.teamB.map((id, idx) => ({ id, team: "teamB", idx, matchId: m.id })),
      ],
    }));

  const renderItem = (item) => {
    const p = playersById[item.id];
    if (!p) return null;
    return (
      <button key={`${item.matchId || "pool"}-${item.id}`} className="bq-swap-candidate" onClick={() => onPick(item)}>
        <Avatar name={p.name} size={22} />
        <div className="bq-swap-candidate-info">
          <span className="bq-swap-candidate-name">{p.name}</span>
          <LevelBadge level={p.level} abbreviate />
        </div>
      </button>
    );
  };

  return (
    <div className="bq-swap-picker" onClick={(e) => e.stopPropagation()}>
      <div className="bq-swap-picker-head">
        <span>Swap out {originPlayer?.name}</span>
        <button className="bq-icon-btn" onClick={onClose}><X size={13} /></button>
      </div>
      <div className="bq-swap-picker-list">
        {sameMatchItems.length > 0 && (
          <div className="bq-swap-section">
            <div className="bq-swap-section-label">This match</div>
            {sameMatchItems.map(renderItem)}
          </div>
        )}
        <div className="bq-swap-section">
          <div className="bq-swap-section-label">Pool</div>
          {poolItems.length === 0 && <p className="bq-muted-sm" style={{ padding: "0 4px" }}>Empty</p>}
          {poolItems.map(renderItem)}
        </div>
        {otherMatchGroups.map((g) => g.items.length > 0 && (
          <div key={g.label} className="bq-swap-section">
            <div className="bq-swap-section-label">{g.label}</div>
            {g.items.map(renderItem)}
          </div>
        ))}
      </div>
    </div>
  );
}

/*  Manual match builder                                                   */

function ManualMatchModal({ queue, playersById, courts, onClose, onAddPending, onStartNow }) {
  const [manualIds, setManualIds] = useState([]);
  const [pairingIdx, setPairingIdx] = useState(0);
  const queuePlayers = queue.map((id) => playersById[id]).filter(Boolean);
  const openCourts = courts.filter((c) => !c.match);

  const toggle = (id) => setManualIds((prev) => (prev.includes(id) ? prev.filter((x) => x !== id) : prev.length >= 4 ? prev : [...prev, id]));
  const four = manualIds.map((id) => playersById[id]).filter(Boolean);
  const split = four.length === 4 ? evaluateSplit(four, pairingIdx % 3) : null;
  const built = split ? { teamA: split.teamA, teamB: split.teamB, category: split.category, players: four } : null;

  return (
    <div className="bq-modal-overlay" onClick={onClose}>
      <div className="bq-modal" onClick={(e) => e.stopPropagation()}>
        <div className="bq-modal-head"><h3><Wand2 size={17} /> Build match manually</h3><button className="bq-icon-btn" onClick={onClose}><X size={18} /></button></div>
        <div className="bq-modal-body">
          <p className="bq-muted-sm">Pick exactly 4 players from the pool. You can start it even if it doesn't meet the standard rules.</p>
          <div className="bq-manual-grid">
            {queuePlayers.map((p) => (
              <button key={p.id} className={`bq-manual-pick ${manualIds.includes(p.id) ? "bq-manual-pick-active" : ""}`} onClick={() => toggle(p.id)}>
                <Avatar name={p.name} size={26} />
                <div className="bq-manual-pick-info">
                  <span className="bq-manual-pick-name">{p.name}</span>
                  <LevelBadge level={p.level} />
                </div>
                <GenderDot gender={p.gender} />
              </button>
            ))}
          </div>

          {four.length === 4 && (
            <div className="bq-suggestion" style={{ marginTop: 12 }}>
              <div className="bq-row-gap">
                <button className="bq-btn bq-btn-ghost" onClick={() => setPairingIdx((i) => (i + 1) % 3)}><RefreshCw size={14} /> Try other pairing</button>
                {!split.valid && <span className="bq-warn-inline"><AlertTriangle size={13} /> Not a standard rule combo — override allowed</span>}
              </div>
              <CategoryChip category={split.category} />
              <div className="bq-teams" style={{ marginTop: 10 }}>
                <TeamBlock ids={split.teamA.map((p) => p.id)} playersById={playersById} />
                <div className="bq-vs">VS</div>
                <TeamBlock ids={split.teamB.map((p) => p.id)} playersById={playersById} />
              </div>
            </div>
          )}

          <div className="bq-modal-actions">
            <button className="bq-btn bq-btn-ghost" onClick={onClose}>Cancel</button>
            <button className="bq-btn bq-btn-ghost" disabled={!built} onClick={() => onAddPending(built)}>Add to pending queue</button>
            {openCourts[0] && <button className="bq-btn bq-btn-primary" disabled={!built} onClick={() => onStartNow(built, openCourts[0].id)}>Start now on {openCourts[0].label}</button>}
          </div>
        </div>
      </div>
    </div>
  );
}

  const [gender, setGender] = useState("Male");
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState({});
  const [confirmClear, setConfirmClear] = useState(false);

  useEffect(() => {
    if (!confirmClear) return;
    const t = setTimeout(() => setConfirmClear(false), 3000);
    return () => clearTimeout(t);
  }, [confirmClear]);
  const handleClearClick = () => {
    if (!confirmClear) { setConfirmClear(true); return; }
    clearRoster();
    setConfirmClear(false);
  };

  const submitAdd = () => { addPlayer(name, level, gender); setName(""); };
  const startEdit = (p) => { setEditingId(p.id); setEditDraft({ name: p.name, level: p.level, gender: p.gender }); };
  const saveEdit = () => { editPlayer(editingId, editDraft); setEditingId(null); };

  return (
    <div className="bq-players-layout">
      <div className="bq-add-form">
        <h2>Add player</h2>
        <input placeholder="Player name" value={name} onChange={(e) => setName(e.target.value)} onKeyDown={(e) => { if (e.key === "Enter") submitAdd(); }} className="bq-input" />
        <select value={level} onChange={(e) => setLevel(e.target.value)} className="bq-select" style={{ width: "100%" }}>{LEVELS.map((l) => <option key={l} value={l}>{l}</option>)}</select>
        <select value={gender} onChange={(e) => setGender(e.target.value)} className="bq-select" style={{ width: "100%" }}>{GENDERS.map((g) => <option key={g} value={g}>{g}</option>)}</select>
        <button type="button" className="bq-btn bq-btn-primary" style={{ width: "100%", justifyContent: "center" }} onClick={submitAdd}><Plus size={15} /> Add to roster</button>
      </div>

      <div className="bq-roster">
        <div className="bq-section-head">
          <h2>Roster <span className="bq-muted-sm">({players.length})</span></h2>
          {players.length > 0 && (
            <button className={`bq-btn ${confirmClear ? "bq-btn-danger" : "bq-btn-ghost"}`} onClick={handleClearClick}>
              <Trash2 size={14} /> {confirmClear ? "Click again to confirm" : "Clear Roster"}
            </button>
          )}
        </div>
        <div className="bq-roster-list">
          {players.length === 0 && <p className="bq-empty">No players yet — add your first player.</p>}
          {players.map((p, i) => {
            const inQueue = queue.includes(p.id);
            const busy = reservedIds.has(p.id);
            const editing = editingId === p.id;
            return (
              <div key={p.id} className="bq-roster-row">
                <span className="bq-roster-num">{i + 1}</span>
                <Avatar name={p.name} />
                {editing ? (
                  <>
                    <input className="bq-input bq-input-inline" value={editDraft.name} onChange={(e) => setEditDraft((d) => ({ ...d, name: e.target.value }))} />
                    <select className="bq-select" value={editDraft.level} onChange={(e) => setEditDraft((d) => ({ ...d, level: e.target.value }))}>{LEVELS.map((l) => <option key={l} value={l}>{l}</option>)}</select>
                    <select className="bq-select" value={editDraft.gender} onChange={(e) => setEditDraft((d) => ({ ...d, gender: e.target.value }))}>{GENDERS.map((g) => <option key={g} value={g}>{g}</option>)}</select>
                    <button className="bq-icon-btn" onClick={saveEdit}><Check size={16} /></button>
                    <button className="bq-icon-btn" onClick={() => setEditingId(null)}><X size={16} /></button>
                  </>
                ) : (
                  <>
                    <div className="bq-roster-name-col">
                      <div className="bq-roster-name">{p.name} <GenderDot gender={p.gender} /></div>
                      <LevelBadge level={p.level} />
                    </div>
                    <div className="bq-roster-count" title="Matches played today"><Trophy size={13} /> <span className="bq-mono">{p.matchesToday}</span></div>
                    <div className="bq-roster-actions">
                      {!busy && <button className="bq-icon-btn" title={inQueue ? "Already in pool" : "Add to pool"} disabled={inQueue} onClick={() => addToQueue(p.id)}><UserPlus size={15} /></button>}
                      <button className="bq-icon-btn" title="Edit" onClick={() => startEdit(p)}><Pencil size={15} /></button>
                      <button className="bq-icon-btn bq-icon-danger" title="Delete" onClick={() => deletePlayer(p.id)}><Trash2 size={15} /></button>
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------------- */
/*  Ranking tab                                                            */
/* ---------------------------------------------------------------------- */
function RankingTab({ players, history }) {
  const colors = useThemeColors();
  const [subTab, setSubTab] = useState("wins");
  const [exportPreview, setExportPreview] = useState(null); // { canvas, fileName, title } | null
  const ranked = computeRankings(history, players);

  let sorted, ranks;
  if (subTab === "wins") {
    sorted = [...ranked].sort((a, b) => b.wins - a.wins || b.scoreDiff - a.scoreDiff);
    ranks = computeDenseRanks(sorted, (a, b) => a.wins === b.wins && a.scoreDiff === b.scoreDiff);
  } else if (subTab === "points") {
    sorted = [...ranked].sort((a, b) => b.points - a.points || a.matches - b.matches);
    ranks = computeDenseRanks(sorted, (a, b) => a.points === b.points && a.matches === b.matches);
  } else {
    const winPct = (r) => Math.round((r.wins / r.matches) * 100); // compare the same rounded % shown on screen
    sorted = [...ranked].sort((a, b) => winPct(b) - winPct(a) || b.scoreDiff - a.scoreDiff);
    ranks = computeDenseRanks(sorted, (a, b) => winPct(a) === winPct(b) && a.scoreDiff === b.scoreDiff);
  }

  const subTabs = [
    { key: "wins", label: "By Wins" },
    { key: "points", label: "By Points" },
    { key: "winPercent", label: "By Win%" },
  ];
  const activeLabel = subTabs.find((t) => t.key === subTab).label;

  return (
    <div className="bq-ranking">
      <div className="bq-chip-row" style={{ marginBottom: 14 }}>
        {subTabs.map((t) => (
          <button key={t.key} className={`bq-chip ${subTab === t.key ? "bq-chip-active" : ""}`} onClick={() => setSubTab(t.key)}>{t.label}</button>
        ))}
      </div>

      <div className="bq-pay-table-wrap">
        <div className="bq-pay-heading-row">
          <h2>{activeLabel} <span className="bq-muted-sm">({sorted.length} ranked)</span></h2>
          <button className="bq-btn bq-btn-ghost" onClick={async () => { const canvas = await renderExportCanvas(activeLabel, rankingColumns(subTab, ranks), sorted, colors); setExportPreview({ canvas, fileName: `${activeLabel.replace(/[^a-z0-9]/gi, "_")}.png`, title: activeLabel }); }} disabled={sorted.length === 0}>Share</button>
        </div>
        {sorted.length === 0 ? (
          <p className="bq-empty">No scored matches yet. Enter final scores in the History tab to populate rankings — players only appear here once they have at least one scored match.</p>
        ) : (
          <div className="bq-pay-table-scroll">
            <table className="bq-pay-table">
              <thead>
                {subTab === "wins" && <tr><th>#</th><th>Player</th><th>Wins</th><th>Score diff</th></tr>}
                {subTab === "points" && <tr><th>#</th><th>Player</th><th>Points</th><th>Matches</th></tr>}
                {subTab === "winPercent" && <tr><th>#</th><th>Player</th><th>Win%</th><th>Score diff</th></tr>}
              </thead>
              <tbody>
                {sorted.map((p, i) => (
                  <tr key={p.id}>
                    <td className="bq-mono">{ranks[i]}</td>
                    <td>{p.name}</td>
                    {subTab === "wins" && <><td className="bq-mono">{p.wins}</td><td className="bq-mono">{p.scoreDiff >= 0 ? "+" : ""}{p.scoreDiff}</td></>}
                    {subTab === "points" && <><td className="bq-mono">{p.points}</td><td className="bq-mono">{p.matches}</td></>}
                    {subTab === "winPercent" && <><td className="bq-mono">{Math.round((p.wins / p.matches) * 100)}%</td><td className="bq-mono">{p.scoreDiff >= 0 ? "+" : ""}{p.scoreDiff}</td></>}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {exportPreview && <ExportPreviewModal canvas={exportPreview.canvas} fileName={exportPreview.fileName} title={exportPreview.title} onClose={() => setExportPreview(null)} />}
    </div>
  );
}
