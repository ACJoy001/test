function PaymentTab({ players, shuttlePrice, setShuttlePrice, courtFeePerHour, setCourtFeePerHour, courtFeeMode, setCourtFeeMode, totalCourtFee, setTotalCourtFee, setPlayerMisc, togglePaid, colors }) {
  const [expanded, setExpanded] = useState(false);
  const [exportPreview, setExportPreview] = useState(null); // { canvas, fileName, title } | null
  const perGameCourtFee = (parseFloat(courtFeePerHour) || 0) / 3 / 4;
  const participantCount = players.filter((p) => p.matchesToday >= 1).length;
  const perPlayerShare = participantCount > 0 ? (parseFloat(totalCourtFee) || 0) / participantCount : 0;
  const rows = computeBillRows(players, shuttlePrice, courtFeePerHour, courtFeeMode, totalCourtFee);
  const grand = rows.reduce((acc, r) => ({ court: acc.court + r.courtCost, shuttle: acc.shuttle + r.shuttleCost, misc: acc.misc + r.misc, total: acc.total + r.total }), { court: 0, shuttle: 0, misc: 0, total: 0 });
  const columns = getBillsColumns(expanded);

  return (
    <div className="bq-payment">
      <div className="bq-payment-settings">
        <h2>Rates</h2>
        <div className="bq-chip-row" style={{ marginBottom: 12 }}>
          <button className={`bq-chip ${courtFeeMode === "perGame" ? "bq-chip-active" : ""}`} onClick={() => setCourtFeeMode("perGame")}>Pay per game</button>
          <button className={`bq-chip ${courtFeeMode === "sharing" ? "bq-chip-active" : ""}`} onClick={() => setCourtFeeMode("sharing")}>Court sharing</button>
        </div>
        <div className="bq-pay-settings-grid">
          <label className="bq-pay-field">
            <span>Shuttlecock price <InfoTip text="Split 4 ways, charged to a player only for games where the court's &quot;New shuttlecock&quot; box was ticked." /></span>
            <div className="bq-pay-input-wrap">
              <span>₱</span>
              <input type="text" inputMode="decimal" placeholder="0.00" className="bq-input" value={shuttlePrice} onChange={(e) => setShuttlePrice(e.target.value)} />
            </div>
          </label>
          {courtFeeMode === "perGame" ? (
            <label className="bq-pay-field">
              <span>Court fee per hour <InfoTip text={`÷ 3 games/hour ÷ 4 players = ${fmt(perGameCourtFee)} per player per game, rounded up to the next peso in the table.`} /></span>
              <div className="bq-pay-input-wrap">
                <span>₱</span>
                <input type="text" inputMode="decimal" placeholder="0.00" className="bq-input" value={courtFeePerHour} onChange={(e) => setCourtFeePerHour(e.target.value)} />
              </div>
            </label>
          ) : (
            <label className="bq-pay-field">
              <span>Total court fee <InfoTip text={`Split evenly across everyone who played at least 1 game today (${participantCount} player${participantCount !== 1 ? "s" : ""} right now) = ${fmt(perPlayerShare)} each, rounded up to the next peso. Someone who played 4 games pays the same share as someone who played 1.`} /></span>
              <div className="bq-pay-input-wrap">
                <span>₱</span>
                <MiscFormulaInput value={totalCourtFee} onCommit={setTotalCourtFee} title="You can type a formula like 60*2 and press Enter" />
              </div>
            </label>
          )}
        </div>
      </div>

      <div className="bq-pay-table-wrap">
        <div className="bq-pay-heading-row">
          <h2>
            Bills <span className="bq-muted-sm">({rows.length} players)</span> <InfoTip text="Use the Misc column to add a one-off charge (+) or credit (−) for any individual player. Only players with a nonzero total are shown." />
            <button className="bq-expand-btn" onClick={() => setExpanded((e) => !e)} title={expanded ? "Collapse: hide Court fee & Shuttle fee columns" : "Expand: show Court fee & Shuttle fee columns"}>{expanded ? "−" : "+"}</button>
          </h2>
          <button className="bq-btn bq-btn-ghost" onClick={async () => { const canvas = await renderExportCanvas("Bills", columns, rows, colors); setExportPreview({ canvas, fileName: "Bills.png", title: "Bills" }); }} disabled={rows.length === 0}>Share</button>
        </div>
        {rows.length === 0 ? (
          <p className="bq-empty">No players with a bill yet.</p>
        ) : (
          <div className="bq-pay-table-scroll">
          <table className="bq-pay-table">
            <thead>
              <tr>
                <th>Player</th><th>Games</th><th>Misc (+/−)</th>
                {expanded && <><th>Court fee</th><th>Shuttle fee</th></>}
                <th>Total</th><th>Paid</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r) => (
                <tr key={r.id}>
                  <td>{r.name}</td>
                  <td className="bq-mono">{r.games}</td>
                  <td>
                    <MiscFormulaInput
                      value={r.rawMiscAdjustment || ""}
                      onCommit={(v) => setPlayerMisc(r.id, v)}
                      title="Add a charge (+) or credit (−). Simple formulas like 50+30 also work — press Enter or click away to calculate."
                    />
                  </td>
                  {expanded && <><td className="bq-mono">{fmt(r.courtCost)}</td><td className="bq-mono">{fmt(r.shuttleCost)}</td></>}
                  <td className="bq-mono bq-pay-total-cell">{fmt(r.total)}</td>
                  <td>
                    <label className="bq-paid-check">
                      <input type="checkbox" checked={r.paid} onChange={() => togglePaid(r.id)} />
                    </label>
                  </td>
                </tr>
              ))}
            </tbody>
            <tfoot>
              <tr>
                <td colSpan={2}>Grand total</td>
                <td className="bq-mono">{fmt(grand.misc)}</td>
                {expanded && <><td className="bq-mono">{fmt(grand.court)}</td><td className="bq-mono">{fmt(grand.shuttle)}</td></>}
                <td className="bq-mono bq-pay-total-cell">{fmt(grand.total)}</td>
                <td></td>
              </tr>
            </tfoot>
          </table>
          </div>
        )}
      </div>
      {exportPreview && <ExportPreviewModal canvas={exportPreview.canvas} fileName={exportPreview.fileName} title={exportPreview.title} onClose={() => setExportPreview(null)} />}
    </div>
  );
}

      .bq-calc-display { font-family: 'IBM Plex Mono', monospace; font-size: 22px; text-align: right; padding: 12px 10px; background: ${COLORS.card}; border: 1px solid #E7E2D3; border-radius: 10px; margin-bottom: 10px; min-height: 22px; overflow-x: auto; white-space: nowrap; color: ${COLORS.ink}; }
      .bq-calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
      .bq-calc-key { font-family: ${fontFamily}; font-size: 16px; font-weight: 700; padding: 12px 0; border-radius: 10px; border: 1px solid #DDD6C2; background: ${COLORS.card}; color: ${COLORS.ink}; cursor: pointer; }
      .bq-calc-key:active { background: ${COLORS.cream}; }
      .bq-calc-key-op { color: ${COLORS.accent}; }
      .bq-calc-key-wide { grid-column: span 2; }
      .bq-calc-key-equals { background: ${COLORS.accent}; color: ${COLORS.headerText}; border-color: ${COLORS.accent}; }

      .bq-btn-danger { background: ${COLORS.danger}; color: ${COLORS.cream}; }

      .bq-footer { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 18px 16px; opacity: 0.75; }
      .bq-footer-reset-btn { background: none; border: none; color: ${COLORS.muted}; font-size: 11.5px; font-family: ${fontFamily}; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; padding: 4px; }
      .bq-footer-reset-btn:hover { color: ${COLORS.danger}; }
      .bq-reset-list { margin: 8px 0; padding-left: 18px; font-size: 12.5px; color: ${COLORS.ink}; display: flex; flex-direction: column; gap: 4px; }

      .bq-settings-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; align-items: start; }
      .bq-settings-card { background: ${COLORS.card}; border: 1px solid #E7E2D3; border-radius: 14px; padding: 16px; }
      .bq-settings-card h2 { font-family: 'Oswald'; font-size: 15px; text-transform: uppercase; color: ${COLORS.accent}; margin: 0 0 8px; display: flex; align-items: center; gap: 7px; }
      .bq-settings-card > p { margin-bottom: 12px; }
      .bq-settings-field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
      .bq-settings-field:last-child { margin-bottom: 0; }
      .bq-settings-field > span { font-size: 12px; font-weight: 700; color: ${COLORS.ink}; }
      .bq-theme-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .bq-theme-swatch { border: 2px solid transparent; border-radius: 12px; padding: 10px; cursor: pointer; display: flex; flex-direction: column; gap: 6px; }
      .bq-theme-swatch-active { outline: 2px solid ${COLORS.accent}; outline-offset: 2px; }
      .bq-theme-swatch-bar { display: block; height: 8px; border-radius: 4px; }
      .bq-theme-swatch-label { font-size: 11.5px; font-weight: 700; text-align: left; }

      .bq-toast { position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%); background: ${COLORS.courtDark}; color: ${COLORS.cream}; padding: 10px 18px; border-radius: 10px; font-size: 12.5px; font-weight: 600; box-shadow: 0 8px 24px rgba(0,0,0,0.3); z-index: 60; }
      .bq-toast-warn { background: #7A4B1E; }
      .bq-toast-success { background: ${COLORS.accent}; }

      *:focus-visible { outline: 2px solid ${COLORS.accent}; outline-offset: 2px; }
    `}</style>
  );
}
